<div class="jobs-page">
  <h1>Job Descriptions</h1>
  <mat-card>
    <mat-card-header>
      <mat-card-title>Create Job</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Title</mat-label>
          <input matInput formControlName="title" placeholder="Backend Developer">
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Description</mat-label>
          <textarea matInput formControlName="description" rows="4" placeholder="Job description..."></textarea>
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Required Skills (comma-separated)</mat-label>
          <input matInput formControlName="requiredSkills" placeholder="C#, .NET, SQL, Azure, REST API">
        </mat-form-field>
        <button mat-raised-button color="primary" type="submit" [disabled]="loading">
          {{ loading ? 'Creating...' : 'Create Job' }}
        </button>
      </form>
    </mat-card-content>
  </mat-card>
  <mat-card class="jobs-list">
    <mat-card-header>
      <mat-card-title>Job List</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <table mat-table [dataSource]="jobs" class="mat-elevation-z0">
        <ng-container matColumnDef="title">
          <th mat-header-cell *matHeaderCellDef>Title</th>
          <td mat-cell *matCellDef="let row">{{ row.title }}</td>
        </ng-container>
        <ng-container matColumnDef="requiredSkills">
          <th mat-header-cell *matHeaderCellDef>Required Skills</th>
          <td mat-cell *matCellDef="let row">{{ row.requiredSkills }}</td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="['title', 'requiredSkills']"></tr>
        <tr mat-row *matRowDef="let row; columns: ['title', 'requiredSkills']"></tr>
      </table>
      <p *ngIf="jobs.length === 0">No jobs yet. Create one above.</p>
    </mat-card-content>
  </mat-card>
</div>
